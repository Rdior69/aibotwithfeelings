name: Bug Report
description: Report something that is broken
title: "bugfix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Search existing issues before filing. See [CONTRIBUTING.md](../CONTRIBUTING.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS / iOS version, Xcode version, branch or commit
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria (fix verified when…)
    validations:
      required: true
