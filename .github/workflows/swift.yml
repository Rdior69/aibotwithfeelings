name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build and test
      run: |
        xcodebuild test \
          -project aibotwithfeelings.xcodeproj \
          -scheme aibotwithfeelings \
          -destination 'platform=macOS' \
          CODE_SIGNING_ALLOWED=NO
