name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linux-core-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.0"
    - name: Build core library
      run: swift build --target AIBotCompanionCore
    - name: Run core tests
      run: swift test

  ios-xcode-tests:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.5'
    - name: Resolve iOS Simulator
      id: sim
      run: |
        UDID=$(python3 <<'PY'
        import json, subprocess, sys

        def run(cmd):
            return subprocess.check_output(cmd, text=True)

        payload = json.loads(run(["xcrun", "simctl", "list", "devices", "available", "-j"]))
        for runtime in sorted((r for r in payload["devices"] if "iOS" in r), reverse=True):
            for device in payload["devices"][runtime]:
                if device.get("isAvailable") and "iPhone" in device.get("name", ""):
                    print(device["udid"])
                    sys.exit(0)

        runtimes = json.loads(run(["xcrun", "simctl", "list", "runtimes", "-j"]))["runtimes"]
        ios_runtime = next(
            r for r in runtimes
            if r.get("isAvailable") and "iOS" in r.get("name", "")
        )
        devicetypes = json.loads(run(["xcrun", "simctl", "list", "devicetypes", "-j"]))["devicetypes"]
        devicetype = next(
            (t["identifier"] for t in devicetypes if "iPhone 17" in t["name"]),
            next(t["identifier"] for t in devicetypes if "iPhone" in t["name"]),
        )
        udid = run(
            ["xcrun", "simctl", "create", "CI iPhone", devicetype, ios_runtime["identifier"]]
        ).strip()
        print(udid)
        PY
        )
        echo "udid=$UDID" >> "$GITHUB_OUTPUT"
        echo "Using iOS Simulator: $UDID"
        xcrun simctl boot "$UDID" 2>/dev/null || true
        xcrun simctl bootstatus "$UDID" -b
    - name: Build and test
      run: |
        xcodebuild test \
          -project aibotwithfeelings.xcodeproj \
          -scheme aibotwithfeelings \
          -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
          -only-testing:aibotwithfeelingsTests \
          CODE_SIGNING_ALLOWED=NO
